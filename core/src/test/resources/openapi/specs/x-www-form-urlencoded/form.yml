openapi: '3.0.3'
info:
  title: Form URL Encoded API
  version: '1.0'
servers:
  - url: https://api.server.test
paths:
  /form:
    post:
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  format: uuid
                count:
                  type: integer
                address:
                  # complex types are stringified to support RFC 1866
                  type: object
                  properties:
                    city:
                      type: string
                    country:
                      type: string
                      minLength: 3
                tags:
                  type: array
                  items:
                    type: string
                counts:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: OK
