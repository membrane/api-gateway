# From OAS 3.1.1 Specification
# 4.8.15.2.1 Example: URL Encoded Form with JSON Values
openapi: '3.1.1'
info:
  title: API Title
  version: '1.0'
servers:
  - url: https://api.server.test/v1
paths:
  /address:
    put:
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                address:
                  # complex types are stringified to support RFC 1866
                  type: object
                  properties:
                    city:
                      type: string
                    country:
                      type: string
                      minLength: 3
      responses:
        '200':
          description: OK
