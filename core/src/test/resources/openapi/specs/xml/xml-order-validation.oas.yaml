openapi: 3.1.0
info:
  title: XML Order Validation API
  version: 1.0.0

servers:
  - url: http://localhost:8080

x-membrane-validation:
  requests: true
  responses: true

paths:
  /orders:
    post:
      summary: Create an order using XML
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              $ref: "#/components/schemas/Order"
      responses:
        "201":
          description: Order created
          content:
            application/xml:
              schema:
                $ref: "#/components/schemas/OrderConfirmation"

components:
  schemas:
    Order:
      type: object
      required:
        - id
        - customer
      xml:
        name: order
      properties:
        id:
          type: integer
          example: 4711
        customer:
          type: string
          example: Anna Müller
        items:
          type: array
          xml:
            wrapped: true
            name: items
          items:
            $ref: "#/components/schemas/Item"

    Item:
      type: object
      xml:
        name: item
      properties:
        productId:
          type: string
          example: P10
        quantity:
          type: integer
          example: 2

    OrderConfirmation:
      type: object
      xml:
        name: orderConfirmation
      properties:
        orderId:
          type: integer
          example: 4711
        status:
          type: string
          example: created
