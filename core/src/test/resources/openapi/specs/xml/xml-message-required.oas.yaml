openapi: 3.1.0
info:
  title: XML Order API (required fields)
  version: 1.0.0

paths:
  /orders:
    post:
      summary: Create an order using XML with required fields
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              $ref: "#/components/schemas/Order"

      responses:
        "201":
          description: Order created

components:
  schemas:
    Order:
      type: object
      required:
        - id
        - customer
      xml:
        name: order
      properties:
        id:
          type: integer
          example: 4711
        customer:
          type: string
          example: Anna Müller
        items:
          type: array
          xml:
            wrapped: true
            name: items
          items:
            $ref: "#/components/schemas/Item"

    Item:
      type: object
      xml:
        name: item
      properties:
        productId:
          type: string
          example: P10
        quantity:
          type: integer
          example: 2
