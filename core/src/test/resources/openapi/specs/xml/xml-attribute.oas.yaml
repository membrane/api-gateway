openapi: 3.1.0
info:
  title: XML Product API (attributes)
  version: 1.0.0

paths:
  /products:
    post:
      summary: Create a product whose sku is carried in an XML attribute
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              $ref: "#/components/schemas/Product"
      responses:
        "201":
          description: Product created

components:
  schemas:
    Product:
      type: object
      required:
        - sku
      xml:
        name: product
      properties:
        sku:
          type: string
          xml:
            attribute: true
        name:
          type: string
