# yaml-language-server: $schema=https://www.membrane-api.io/v7.2.4.json
#
# Tutorial: SQL Injection Protection
#
# Blocks requests whose query parameters, path or body contain SQL injection
# patterns, using detection rules derived from the OWASP Core Rule Set (CRS).
# The rules are bundled - nothing to download.
#
# 1.) Start Membrane:
#     ./membrane.sh -c 100-SQL-Injection-Protection.yaml
#
# 2.) A normal request passes through:
#     curl -H 'Content-Type: application/json' -d '{"q":"laptop"}' localhost:2000
#
#     200
#
# 3.) A SQL injection attempt is blocked with 400:
#     curl -H 'Content-Type: application/json' -d '{"q":"SELECT pw FROM information_schema.tables"}' localhost:2000
#
#     400  "Request blocked by SQL injection protection"
#
# 4.) A blind-injection attempt is blocked too:
#     curl -H 'Content-Type: application/json' -d '{"q":"1 OR sleep(5)"}' localhost:2000
#
#     400
#
# Scope it to one direction by wrapping it in a request: or response: flow block.
# Inspecting responses is useful when Membrane is an outbound gateway in front of
# an untrusted upstream:
#
#     flow:
#       - response:
#           - sqlInjectionProtection: {}
#
# Reference: https://www.membrane-api.io/docs/current/sqlInjectionProtection.html

api:
  port: 2000
  flow:
    - sqlInjectionProtection:
        level: 1          # OWASP CRS paranoia level 1-4; higher catches more but raises false positives
        # onDetect: warn  # only log the hit and let the request through - use while tuning a deployment
        # inspectHeaders: true  # also scan request headers (off by default: headers cause more false positives)
    - return:
        status: 200
