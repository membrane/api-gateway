# yaml-language-server: $schema=https://www.membrane-api.io/v7.2.4.json
#
# Tutorial: OAuth2 Password Flow
#
# Protect an API with OAuth2 using Membrane as both the authorization server
# and the token-validating gateway.
#
# 1.) Start Membrane:
#     ./membrane.sh -c 51-OAuth2-Password-Flow.yaml
#
# 2.) Get an access token:
#     curl -v -s -d "grant_type=password&username=john&password=password&client_id=abc&client_secret=def" localhost:7007/oauth2/token
#
#     {"access_token":"<token>","token_type":"bearer",...}
#
# 3.) Call the API with the token (replace <token>):
#     curl -v -H "Authorization: Bearer <token>" localhost:2000
#
#     Secret resource accessed!

api:
  name: Authorization Server
  port: 7007
  flow:
    - oauth2authserver:
        issuer: http://localhost:7007
        staticUserDataProvider:
          users:
            - username: john
              password: password
        staticClientList:
          clients:
            - clientId: abc
              clientSecret: def
              callbackUrl: http://localhost:2000/oauth2callback
        bearerToken: {}
        claims:
          value: sub
          scopes:
            - id: read
              claims: sub

---
api:
  name: Protected API
  port: 2000
  flow:
    - tokenValidator:
        endpoint: http://localhost:7007/oauth2/userinfo
  target:
    host: localhost
    port: 3000

---
api:
  name: Backend
  port: 3000
  flow:
    - static:
        src: Secret resource accessed!
    - return:
        status: 200
