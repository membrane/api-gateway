# yaml-language-server: $schema=https://www.membrane-api.io/v7.2.4.json
#
# Tutorial: OAuth2 Client Credentials Flow
#
# Machine-to-machine API access: a service authenticates with its own client ID
# and secret. No user login required.
#
# 1.) Start Membrane:
#     ./membrane.sh -c 52-OAuth2-Client-Credentials.yaml
#
# 2.) Get an access token (no username/password — client credentials only):
#     curl -v -s -d "grant_type=client_credentials&client_id=abc&client_secret=def" localhost:7007/oauth2/token
#
#     {"access_token":"<token>","token_type":"bearer",...}
#
# 3.) Call the API with the token (replace <token>):
#     curl -v -H "Authorization: Bearer <token>" localhost:2000
#
#     Service accessed!
#
# Continue with file 53-OAuth2-Client-Token-Renewal.yaml

api:
  name: Authorization Server
  port: 7007
  flow:
    - oauth2authserver:
        issuer: http://localhost:7007
        staticUserDataProvider:
          users:
            - username: john
              password: password
        staticClientList:
          clients:
            - clientId: abc
              clientSecret: def
              callbackUrl: http://localhost:2000/oauth2callback
        bearerToken: {}
        claims:
          value: sub
          scopes:
            - id: read
              claims: sub

---
api:
  name: Protected API
  port: 2000
  flow:
    - tokenValidator:
        endpoint: http://localhost:7007/oauth2/userinfo
  target:
    host: localhost
    port: 3000

---
api:
  name: Backend
  port: 3000
  flow:
    - static:
        src: Service accessed!
    - return:
        status: 200
