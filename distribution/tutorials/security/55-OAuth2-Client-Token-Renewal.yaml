# yaml-language-server: $schema=https://www.membrane-api.io/v7.2.4.json
#
# Tutorial: OAuth2 Client — Automatic Token Management
#
# The gateway fetches and renews access tokens transparently.
# Callers need no credentials — Membrane handles the full token lifecycle.
# Tokens expire after 60 seconds; the gateway re-fetches automatically.
#
# 1.) Start Membrane:
#     ./membrane.sh -c 55-OAuth2-Client-Token-Renewal.yaml
#
# 2.) Call the gateway — no token needed from the caller:
#     curl localhost:2000
#
#     Service accessed! Token: Bearer eyJ...abc
#
# 3.) Wait 60 seconds, then call again to observe token renewal:
#     sleep 60 && curl localhost:2000
#
#     Service accessed! Token: Bearer eyJ...xyz
#
#     The token suffix has changed — Membrane fetched a fresh one automatically.

api:
  name: Authorization Server
  port: 7007
  flow:
    - log:
        message: "Token request: ${method} ${path}"
    - oauth2authserver:
        issuer: http://localhost:7007
        staticUserDataProvider:
          users:
            - username: john
              password: password
        staticClientList:
          clients:
            - clientId: abc
              clientSecret: def
              callbackUrl: http://localhost:2000/oauth2callback
        bearerJwtToken:
          expiration: 60
        claims:
          value: sub
          scopes:
            - id: read
              claims: sub

---

api:
  name: Gateway
  port: 2000
  flow:
    # Fetches a token from the auth server, caches it, and re-fetches before expiry.
    - oauth2Client:
        tokenUrl: http://localhost:7007/oauth2/token
        clientId: abc
        clientSecret: def
  target:
    host: localhost
    port: 3000

---

api:
  name: Protected API
  port: 3000
  flow:
    - tokenValidator:
        endpoint: http://localhost:7007/oauth2/userinfo
  target:
    host: localhost
    port: 4000

---

api:
  name: Backend
  port: 4000
  flow:
    - request:
      - template:
          src: "Service accessed! Token: ${header.Authorization}"
      - return:
          status: 200
