# yaml-language-server: $schema=https://www.membrane-api.io/v7.2.4.json
#
# Tutorial: Issuing and Validating JWTs
#
# Where 40-JWT-Requesting-Token.md put you in the client's seat, this tutorial builds
# the server side: Membrane issues the JWTs AND validates them, so you run a complete,
# self-contained setup with no external authorization server.
#
# You will learn how to:
#   - turn a login into a signed JWT with jwtSign (the token endpoint on /token),
#   - protect an API with jwtAuth so only requests carrying a valid, unexpired,
#     correctly-signed token get through,
#
# 1.) Start Membrane:
#     ./membrane.sh -c 41-JWT-Issuing-and-Validating.yaml
#
# 2.) Request a token:
#     curl -v localhost:2000/token -u "alice:alice-secret"
#
#     {"access_token":"eyJ0eXAiOiJKV1Qi...","token_type":"bearer","expires_in":300}
#
# 3.) Call the resource with the token:
#     curl -v localhost:2000/resource -H "Authorization: Bearer eyJ0eXAiOiJKV1Qi..."
#
#     {"client":"alice","scopes":"read write"}

api:
  port: 2000
  name: Token Server
  path:
    uri: /token
  flow:
    - basicAuthentication:
        users:
          - username: alice
            password: alice-secret
    - request:
        # user() returns the authenticated username; jwtSign adds iat/exp/nbf.
        - template:
            contentType: application/json
            src: |
              {
                "sub": ${user()},
                "aud": "demo-resource",
                "scopes": "read write"
              }
        - jwtSign:
            property: token
            jwk:
              location: jwk.json
        - template:
            contentType: application/json
            src: |
              {
                "access_token": ${property.token},
                "token_type": "bearer",
                "expires_in": 300
              }
    - return:
        status: 200
---
api:
  port: 2000
  name: Protected Resource
  path:
    uri: /resource
  flow:
    - jwtAuth:
        expectedAud: demo-resource
        jwks:
          jwks:
            - location: jwk-public.json
    - template:
        contentType: application/json
        src: |
          {
            "client": ${property.jwt.get("sub")},
            "scopes": ${property.jwt.get("scopes")}
          }
    - return:
        status: 200

# NOTE: jwk.json contains a demo key (private+public). Generate your own for production.
#       jwk-public.json holds only the public parameters and is used by jwtAuth for validation.