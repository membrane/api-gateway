
# yaml-language-server: $schema=https://www.membrane-api.io/v7.1.3.json
#
# Tutorial: XPath
#
# Use XPath to extract data from XML.
#
# 1.) Inspect animals.xml
#
# 2.) Try:
#     curl -d @animals.xml -H "Content-Type: text/xml" http://localhost:2000
#
#     Inspect the console log and the response

api:
  port: 2000
  flow:
    - request:
      - setProperty:
          name: animals
          # DOM NodeList with all animals
          value: ${//animal}
          language: xpath
      - setHeader:
          name: X-Animals
          value: ${property.animals}
      - log:
          language: xpath
          message: |
            # of animals: ${count(//animal)}
      - if:
          # No surrounding ${} because test expects an expression
          test: //animal[@species='dog']
          language: xpath
          flow:
            - log:
                message: Dog found!
      - setBody:
          language: xpath
          contentType: text/plain
          value: |
            Location: ${/animals/location}
            Biscuit is a ${//animal[.='Biscuit']/@species}
            Names: ${//animal}
            Animals: ${//animal/@species}
      - return:
          status: 200
