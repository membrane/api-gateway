# yaml-language-server: $schema=https://www.membrane-api.io/v7.2.1.json
#
# Tutorial: Protected MCP Server
#
# Claude Desktop still connects to http://localhost:2000.
# A local proxy adds the API key before forwarding requests to the
# protected MCP server at http://localhost:8080/mcp.
#
# 1.) Start Membrane:
#
#    Linux/Mac:
#      ./membrane.sh -c 20-MCP-Server-Protected.yaml
#    Windows:
#      membrane.cmd -c 20-MCP-Server-Protected.yaml
#
# 2.) Generate some demo traffic in a second terminal:
#
#    Linux/Mac:
#      ./generate-traffic.sh 20
#    Windows:
#      generate-traffic.cmd 20
#
# 3.) Configure Claude Desktop as described in README.md.
#
# 4.) Ask the AI client to inspect recent exchanges.
#
# The client talks to the local proxy on port 2000.
# The protected MCP endpoint remains hidden behind the API key interceptor.

api:
  port: 2000
  name: MCP-Proxy
  flow:
    - setHeader:
        name: Authorization
        value: apikey 12345
  target:
    url: http://localhost:8080/mcp

---
# The real MCP server is protected by the apiKey interceptor.
# The expected header value is: Authorization: apikey 12345
api:
  port: 8080
  name: MCP-Server-Protected
  path:
    uri: /mcp
  flow:
    - apiKey:
        stores:
          - simple:
              - secret:
                  value: apikey 12345
        extractors:
          - header: Authorization
    - membraneMCPServer:
        maxExchanges: 10000

---
api:
  port: 3000
  name: Fruit-Shop-Demo
  target:
    url: https://api.predic8.de/shop/v2/

---
api:
  port: 3001
  name: ApiBin-Demo
  target:
    url: https://apibin.io/
