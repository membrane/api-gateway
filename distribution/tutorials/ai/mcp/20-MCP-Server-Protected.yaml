# yaml-language-server: $schema=https://www.membrane-api.io/v7.2.1.json
#
# Tutorial: Protected MCP Server
#
# This setup keeps the real MCP server protected with an API key while Claude
# Desktop still talks to a simple local endpoint on http://localhost:2000. The
# local proxy adds the Authorization header and forwards the request to the
# actual MCP server on http://localhost:8080/mcp, so the client setup stays
# simple and the protected endpoint is never exposed without authentication.
#
# 1.) Start Membrane:
#
#    Linux/Mac:
#      ./membrane.sh -c 20-MCP-Server-Protected.yaml
#    Windows:
#      membrane.cmd -c 20-MCP-Server-Protected.yaml
#
# 2.) Generate some demo traffic in a second terminal:
#
#    Linux/Mac:
#      ./generate-traffic.sh 20
#    Windows:
#      generate-traffic.cmd 20
#
#    The script also sends a few typical WordPress/PHP probe requests to a
#    local endpoint on port 3002 that always responds with 404.
#
# 3.) Configure Claude Desktop as described in README.md.
#
# 4.) Ask the AI client to inspect recent exchanges.
#    From the client perspective, it still uses port 2000.

api:
  port: 2000
  name: MCP-Proxy
  flow:
    - setHeader:
        name: Authorization
        value: apikey 12345
  target:
    url: http://localhost:8080/mcp

---
# This is the real MCP endpoint. It accepts only requests with
# Authorization: apikey 12345.
api:
  port: 8080
  name: MCP-Server-Protected
  path:
    uri: /mcp
  flow:
    - apiKey:
        stores:
          - simple:
              - secret:
                  value: apikey 12345
        extractors:
          - header: Authorization
    - membraneMCPServer:
        maxExchanges: 10000

---
api:
  port: 3000
  name: Fruit-Shop-Demo
  target:
    url: https://api.predic8.de/shop/v2/

---
api:
  port: 3001
  name: ApiBin-Demo
  target:
    url: https://apibin.io/

---
# Simulates common background probe traffic such as WordPress/PHP scans.
api:
  port: 3002
  name: 404 Fallback
  flow:
    - return:
        status: 404
