# yaml-language-server: $schema=https://www.membrane-api.io/v7.2.4.json
#
# Example for Configuration Structure
#
# Reference: https://www.membrane-api.io/docs

# Global router settings. Use exactly one `configuration` block.
configuration:
  production: true # Hides sensitive details in error messages
  jmxRouterName: demo # JMX name of the router

  uriFactory:
    # Allow non-RFC-compliant characters like { and } in URIs
    # Warning: This can introduce security risks and should only be enabled if required.
    allowIllegalCharacters: false

    # Escape backslashes in incoming URIs (\\ -> %5C)
    autoEscapeBackslashes: true

  # See: https://www.membrane-api.io/docs/current/proxy-configuration.html
  httpClientConfig:
    adjustHostHeader: true
    useExperimentalHttp2: false
    connection:
      keepAliveTimeout: 60000
      soTimeout: 30000
      timeout: 10000

#    ssl: {} # TLS Configuration
#    proxy: # Proxy settings for Membrane running behind an upstream proxy
#      host: localhost
#      port: 3128
#      ssl:
#        keystore:
#          location: keys.p12
#          password: secret
#        truststore:
#          location: trust.p12
#          password: secret
#      authentication: true
#      username: alice
#      password: secret
---

# Global plugins are applied to all endpoints.
# Useful for central authentication, logging, or header manipulation.
global:
  # jsonProtection and xmlProtection can both be enabled because they detect the message type
  - jsonProtection: {}
  - xmlProtection: {}
  - request:
      - log:
          message: "Path: ${path}"
---

# Reusable plugins and beans that can be referenced elsewhere in the config
# If a plugin is used in multiple APIs this will make the configuration more readable.
#
# Typical components:
# - Stores for exchanges, API Keys, users, keys, certificates
# - TLS configurations
# See: https://www.membrane-api.io/docs/current/components.html
components:
  my-component: # id for the component
    log: {} # referenceable plugin
  jmx:
    bean: # Java Bean
      # Exposes runtime metrics and management operations via JMX
      class: com.predic8.membrane.core.jmx.JmxExporter

  # If exactly one exchangeStore is defined here, it is used automatically.
  # If multiple exchangeStores are configured, they must be referenced explicitly.
  exchangeStore:
    limitedMemoryExchangeStore:
      maxSize: 100000
      maxBodySize: 1000
      bodyExceedingMaxSizeStrategy: truncate

  # Controls which HTTP methods (verbs) the gateway accepts on the request line.
  # If exactly one method validator is defined here, it is applied to every transport
  # automatically. A rejected method is answered with `501 Not Implemented` before the
  # request reaches any API. Pick one of three policies:
  #
  #   knownMethodValidator     only the methods Membrane knows:
  #                            GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS, CONNECT, TRACE
  #   rfc9110MethodValidator   any method matching the RFC 9110 token grammar
  #                            (this is the default applied when no validator is declared)
  #   uppercaseMethodValidator only uppercase letters A-Z
  #
  # `maxLength` (default 20) caps the accepted method length in every policy and guards
  # against oversized method strings.
  methodValidator:
    knownMethodValidator:
      maxLength: 16
---

# Internal proxy, accessible only from within the gateway.
# See: https://www.membrane-api.io/docs/current/internal.html
internal:
  name: internalProxy # Name used to invoke the internal proxy
  flow:
    - log: {}
  target:
    url: https://api.predic8.de
---

# Public API endpoint.
api:
  port: 2000
  flow:
    - $ref: '#/components/my-component' # References the reusable component
  target:
    url: internal://internalProxy # Routes requests to the internal proxy
