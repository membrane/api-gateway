openapi: 3.2.0
info:
  title: Bulk Documents API
  version: 1.0.0
servers:
  - url: http://localhost:3000/
paths:
  /documents:
    # OpenAPI 3.2: itemSchema validates every item of a sequential (streaming) media type.
    post:
      summary: Bulk-ingest documents as a JSON Lines stream
      requestBody:
        required: true
        content:
          application/jsonl:
            itemSchema:
              $ref: '#/components/schemas/Document'
      responses:
        '202':
          description: Accepted
    # OpenAPI 3.2: the QUERY HTTP method carries a request body.
    query:
      summary: Search documents using a request body
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchQuery'
      responses:
        '200':
          description: Matching documents
  /find:
    # OpenAPI 3.2: in: querystring types the whole query string via a content media type.
    get:
      summary: Find documents with a typed query string
      parameters:
        - name: filter
          in: querystring
          content:
            application/x-www-form-urlencoded:
              schema:
                type: object
                required: [term]
                properties:
                  term:
                    type: string
                  page:
                    type: integer
                    minimum: 1
      responses:
        '200':
          description: Matching documents
components:
  schemas:
    Document:
      type: object
      required: [id, title]
      properties:
        id:
          type: string
        title:
          type: string
    SearchQuery:
      type: object
      required: [term]
      properties:
        term:
          type: string
